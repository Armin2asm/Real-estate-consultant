{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>
        {% block title %}Real Estate Website{% endblock %}
    </title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>

        body{
            background:#f5f7fa;
            font-family:Arial, sans-serif;
        }

        /* Navbar */
        .navbar{
            background:linear-gradient(135deg,#1e3c72,#2a5298);
        }

        .navbar-brand{
            color:#fff;
            font-weight:bold;
            display:flex;
            align-items:center;
            gap:10px;
        }

        .navbar-brand:hover{
            color:#fff;
        }

        /* Main Content */
        .main-container{
            margin-top:30px;
        }

        /* Footer */
        footer{
            margin-top:60px;
            background:#1e3c72;
            color:white;
            padding:30px;
            text-align:center;
        }

        .social-icons a{
            color:white;
            font-size:26px;
            margin:0 10px;
            transition:.3s;
        }

        .social-icons a:hover{
            color:#ffc107;
        }

    </style>

</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark shadow">

    <div class="container">

        <a class="navbar-brand" href="/Home/">
            <img src="{% static 'main/images/logo.png' %}" width="50" alt="Logo">
            Real Estate
        </a>

        <div class="ms-auto d-flex flex-column align-items-end">

            {% if user.is_authenticated %}

                <span class="text-white mb-2">
                    Welcome, {{ user.username }}
                </span>

                <form method="post" action="{% url 'account:logout' %}">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger btn-sm">
                        Logout
                    </button>
                </form>

            {% else %}

                <a href="{% url 'account:login' %}" class="btn btn-primary btn-sm mb-2">
                    Login
                </a>

                <a href="{% url 'account:signup' %}" class="btn btn-outline-light btn-sm">
                    Sign Up
                </a>

            {% endif %}

        </div>

    </div>

</nav>

<!-- Main Content -->
<div class="container main-container">

    {% block content %}
    {% endblock %}

</div>

<!-- Footer -->
<footer>

    <h5>Contact Us</h5>

    <p>Phone, Address, Social Media</p>

    <div class="social-icons">

        <a href="#"><i class="fab fa-instagram"></i></a>
        <a href="#"><i class="fab fa-telegram"></i></a>
        <a href="#"><i class="fab fa-linkedin"></i></a>
        <a href="#"><i class="fab fa-github"></i></a>

    </div>

</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
```

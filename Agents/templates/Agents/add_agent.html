{% extends 'base.html' %}

{% block title %}
Add Agent
{% endblock %}

{% block content %}

<div class="container mt-5">

    <h2>Add New Agent</h2>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        {{ form.as_p }}

        <button class="btn btn-primary">
            Save
        </button>

    </form>

</div>

{% endblock %}
